# OpenClaw Gateway WebSocket mock - connection core.
#
# This example is split across several '*-config.yaml' files, one per protocol
# domain (sessions, chat, agents, cron, tools, channels, ...). Imposter loads
# every '*-config.yaml' in the directory, and because they all declare
# 'plugin: websocket' on the same wildcard path, the engine coalesces them into
# a single handler - so one multiplexed connection serves every method,
# whichever file defines it. See README.md for the full method list.
#
# This file owns the connection itself:
# - on connect, send a connect.challenge event and start a periodic tick
# - answer the 'connect' handshake with hello-ok, echoing the request id
# - answer any unmocked method with a canonical method_not_found error frame
plugin: websocket

resources:
  # Connection opened: send the challenge and start the keepalive tick.
  # The challenge 'ts' and tick 'timestamp' are numbers (epoch millis), not
  # strings - the gateway protocol types them as int64.
  - path: /*
    on: open
    response:
      content: '{"type":"event","event":"connect.challenge","payload":{"nonce":"${random.uuid()}","ts":${datetime.now.millis}}}'
      template: true
    schedule:
      - every: 15s
        response:
          content: '{"type":"event","event":"tick","payload":{"timestamp":${datetime.now.millis}}}'
          template: true

  # Handshake request: reply with hello-ok, echoing the request id.
  - path: /*
    requestBody:
      allOf:
        - jsonPath: $.type
          value: req
        - jsonPath: $.method
          value: connect
    capture:
      reqId:
        requestBody:
          jsonPath: $.id
    response:
      file: hello-ok.json
      template: true

  # Fallback for any request method this mock does not implement. It matches
  # only on '$.type == req' (one condition), so every specific method resource
  # - which also matches '$.method' (two conditions) - outscores it and wins.
  # This only fires when no method resource matches.
  - path: /*
    requestBody:
      allOf:
        - jsonPath: $.type
          value: req
    capture:
      reqId:
        requestBody:
          jsonPath: $.id
    response:
      content: '{"type":"res","id":"${stores.request.reqId}","ok":false,"error":{"code":"method_not_found","message":"This method is not implemented by the mock."}}'
      template: true
